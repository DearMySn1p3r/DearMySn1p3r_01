<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>ARCH_CENTRAL_SYNC_SYSTEM</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+KR:wght@300;700&display=swap');

    :root {
        --neon-cyan: #00f2ff;
        --arch-gold: #d4af37;
        --bg-dark: #000000;
    }

    /* 속성별 색상 정의 */
    .theme-none { --theme-color: #ffffff; }
    .theme-pyre { --theme-color: #ff4d00; }
    .theme-aqua { --theme-color: #0088ff; }
    .theme-verde { --theme-color: #00ff66; }
    .theme-fulmen { --theme-color: #f2ff00; }
    .theme-aero { --theme-color: #00ffcc; }
    .theme-glacies { --theme-color: #a0e9ff; }

    body {
        margin: 0; background: var(--bg-dark); color: #fff;
        font-family: 'Orbitron', 'Noto Sans KR', sans-serif;
        display: flex; justify-content: center; align-items: center; min-height: 100vh;
    }

    #capture {
        width: 1200px; height: 750px; background: #000;
        position: relative; padding: 40px; box-sizing: border-box;
        border: 2px solid #222;
        background-image: radial-gradient(circle at center, #111 0%, #000 100%);
    }

    /* 상단 장식 */
    .header {
        display: flex; justify-content: space-between; align-items: center;
        border-bottom: 2px solid #fff; padding-bottom: 15px; margin-bottom: 40px;
    }

    .header h1 { margin: 0; letter-spacing: 10px; font-size: 24px; text-shadow: 0 0 10px #fff; }

    /* 메인 컨텐츠 */
    .main-layout { display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px; align-items: center; }

    /* 카드 스타일 */
    .subject-panel { display: flex; flex-direction: column; gap: 15px; }
    .photo-frame {
        width: 100%; aspect-ratio: 3/4; border: 1px solid var(--theme-color, #fff);
        box-shadow: 0 0 25px var(--theme-color, rgba(255,255,255,0.2));
        background: #050505; transition: 0.5s;
    }
    .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

    /* 입력 폼 */
    .inputs { display: flex; flex-direction: column; gap: 5px; }
    input { background: #111; border: 1px solid #333; color: #fff; padding: 8px; font-size: 12px; }
    
    /* 선택창: 배경 흰색, 글씨 검정 요청 반영 */
    select {
        background: #fff !important; color: #000 !important;
        font-weight: bold; padding: 8px; border: none; cursor: pointer;
    }

    /* 중앙 로고 및 싱크율 */
    .center-core { position: relative; text-align: center; }
    
    /* 중앙 로고 이미지 배치 */
    .arch-logo {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 350px; opacity: 0.15; z-index: 1; pointer-events: none;
    }

    .sync-box { position: relative; z-index: 2; }
    .sync-label { font-size: 14px; letter-spacing: 5px; color: #aaa; margin-bottom: 10px; }
    .percent-val {
        font-size: 120px; font-weight: 900; line-height: 1;
        text-shadow: 0 0 30px #fff; margin: 20px 0;
    }
    .rank-badge {
        display: inline-block; padding: 5px 30px; border: 2px solid #fff;
        font-size: 28px; font-weight: 900; box-shadow: 0 0 20px #fff;
    }

    /* 하단 버튼 */
    .controls { position: absolute; bottom: 30px; right: 40px; display: flex; gap: 10px; }
    button {
        background: transparent; border: 1px solid #fff; color: #fff;
        padding: 10px 25px; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s;
    }
    button:hover { background: #fff; color: #000; box-shadow: 0 0 15px #fff; }

    #alert {
        position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
        background: #fff; color: #000; padding: 10px 40px; font-weight: bold; display: none;
    }
</style>
</head>
<body class="theme-none">

<div id="capture">
    <div id="alert"></div>

    <div class="header">
        <div>DOC_VER: 1.0</div>
        <h1>ARCH_SYNC_MONITOR</h1>
        <div style="color: var(--arch-gold)">OFFICIAL_WORLD_GUIDE</div>
    </div>

    <div class="main-layout">
        <div class="subject-panel" id="panel1">
            <div class="photo-frame"><img id="img1"></div>
            <div class="inputs">
                <input type="file" id="file1">
                <input type="text" id="name1" placeholder="SENTINEL NAME">
                <select id="attr1" onchange="updateTheme(1)">
                    <option value="none">속성 선택 (무속성)</option>
                    <option value="pyre">🔥 불 (Pyre)</option>
                    <option value="aqua">💧 물 (Aqua)</option>
                    <option value="verde">🌿 풀 (Verde)</option>
                    <option value="fulmen">⚡ 번개 (Fulmen)</option>
                    <option value="aero">💨 바람 (Aero)</option>
                    <option value="glacies">❄️ 얼음 (Glacies)</option>
                </select>
            </div>
        </div>

        <div class="center-core">
            <img src="「ARCH」 Symbol Logo White Ver.png" class="arch-logo">
            
            <div class="sync-box">
                <div class="sync-label">SYNCHRONIZATION RATE</div>
                <div class="percent-val" id="percent">--%</div>
                <div class="rank-badge" id="rank">RANK --</div>
            </div>
        </div>

        <div class="subject-panel" id="panel2">
            <div class="photo-frame"><img id="img2"></div>
            <div class="inputs">
                <input type="file" id="file2">
                <input type="text" id="name2" placeholder="GUIDE NAME">
                <select id="attr2" onchange="updateTheme(2)">
                    <option value="none">속성 선택 (무속성)</option>
                    <option value="pyre">🔥 불 (Pyre)</option>
                    <option value="aqua">💧 물 (Aqua)</option>
                    <option value="verde">🌿 풀 (Verde)</option>
                    <option value="fulmen">⚡ 번개 (Fulmen)</option>
                    <option value="aero">💨 바람 (Aero)</option>
                    <option value="glacies">❄️ 얼음 (Glacies)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="calc()">ANALYZE</button>
        <button onclick="saveImage()">SAVE_RESULT</button>
    </div>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
    file1.onchange = e => img1.src = URL.createObjectURL(e.target.files[0]);
    file2.onchange = e => img2.src = URL.createObjectURL(e.target.files[0]);

    // 속성 선택 시 테마 색상 변경 함수
    function updateTheme(side) {
        const select = document.getElementById('attr' + side);
        const panel = document.getElementById('panel' + side);
        const theme = select.value;
        
        // 기존 테마 클래스 제거 후 새 테마 추가
        panel.className = 'subject-panel theme-' + theme;
    }

    function calc(){
        if(!img1.src || !img2.src) {
            const al = document.getElementById('alert');
            al.innerText = "SUBJECT IMAGES REQUIRED";
            al.style.display = "block";
            setTimeout(()=>al.style.display="none", 2000);
            return;
        }

        const p = Math.floor(Math.random()*101);
        percent.innerText = p + "%";

        let r = "C";
        if(p > 99) r = "SSS";
        else if(p > 90) r = "S";
        else if(p > 75) r = "A";
        else if(p > 50) r = "B";
        
        rank.innerText = "RANK " + r;
        
        // 싱크 수치에 따른 광선 효과 강조
        percent.style.textShadow = `0 0 ${p/2}px #fff`;
    }

    function saveImage(){
        const btn = document.querySelector('.controls');
        btn.style.display = 'none'; // 버튼 숨기기

        html2canvas(document.querySelector("#capture"), {
            backgroundColor: "#000",
            scale: 2 // 고화질 저장
        }).then(canvas => {
            const link = document.createElement("a");
            link.download = "ARCH_SYNC_RESULT.png";
            link.href = canvas.toDataURL();
            link.click();
            btn.style.display = 'flex'; // 버튼 복구
        });
    }
</script>
</body>
</html>
