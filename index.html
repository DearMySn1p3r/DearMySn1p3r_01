<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCH_SYNC_OVERLOAD_SYSTEM</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+KR:wght@300;700&display=swap');

    :root {
        --neon-cyan: #00f2ff;
        --arch-gold: #d4af37;
        --theme-color1: #ffffff;
        --theme-color2: #ffffff;
    }

    body {
        margin: 0; background: #050505; color: #fff;
        font-family: 'Orbitron', 'Noto Sans KR', sans-serif;
        display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        padding: 20px; overflow-x: hidden;
    }

    /* 제어 버튼 */
    #top-controls { margin-bottom: 20px; display: flex; gap: 15px; z-index: 5000; }
    button {
        background: transparent; border: 1px solid #fff; color: #fff;
        padding: 10px 30px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold;
        transition: 0.3s;
    }
    button:hover { background: #fff; color: #000; box-shadow: 0 0 20px #fff; }

    /* 캡처 영역 (가로형 1200x800) */
    #capture {
        width: 1200px; height: 800px; background: #000;
        position: relative; padding: 40px; box-sizing: border-box;
        border: 2px solid #333; display: flex; flex-direction: column;
        background-image: 
            linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px),
            radial-gradient(circle at center, #111 0%, #000 100%);
        background-size: 40px 40px, 40px 40px, 100% 100%;
        overflow: hidden;
    }

    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #fff; padding-bottom: 15px; margin-bottom: 30px; }
    .header h1 { margin: 0; letter-spacing: 8px; font-size: 24px; text-shadow: 0 0 10px #fff; }

    .main-grid { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 20px; flex: 1; align-items: center; }

    .subject-info { display: flex; flex-direction: column; gap: 15px; padding: 20px; background: rgba(255,255,255,0.03); border-left: 4px solid var(--theme-color); transition: 0.5s; }
    #info1 { --theme-color: var(--theme-color1); }
    #info2 { --theme-color: var(--theme-color2); }

    .photo-frame { width: 100%; aspect-ratio: 1/1; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
    .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

    .text-display { font-size: 22px; font-weight: 900; letter-spacing: 2px; border-bottom: 1px solid #444; padding-bottom: 5px; }
    .attr-display { font-size: 14px; color: var(--arch-gold); font-family: 'Noto Sans KR'; }

    .center-core { position: relative; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .arch-logo { position: absolute; width: 450px; opacity: 0.12; z-index: 0; pointer-events: none; }
    .sync-val { font-size: 120px; font-weight: 900; line-height: 1; text-shadow: 0 0 30px #fff; margin: 15px 0; font-style: italic; z-index: 1; }
    .rank-badge { font-size: 24px; border: 2px solid #fff; padding: 5px 30px; box-shadow: 0 0 15px #fff; z-index: 1; }

    /* 입력 UI */
    .input-ui { display: flex; justify-content: center; gap: 20px; margin-top: 20px; width: 1200px; padding: 15px; background: rgba(0,0,0,0.5); border: 1px solid #222; }
    .ui-group { display: flex; gap: 10px; align-items: center; }

    /* 🚨 멀티 에러 팝업 스타일 🚨 */
    .error-popup {
        position: absolute; width: 240px; background: #c0c0c0;
        border: 2px solid; border-color: #eee #888 #888 #eee;
        color: #000; padding: 2px; font-family: 'Tahoma', sans-serif; font-size: 11px;
        z-index: 3000; pointer-events: auto; box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
    }
    .err-head { background: #000080; color: #fff; padding: 3px 5px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
    .err-body { padding: 10px; line-height: 1.4; display: flex; gap: 10px; }
</style>
</head>
<body>

<div id="top-controls">
    <button onclick="calc()">ANALYZE SYSTEM</button>
    <button onclick="saveImage()">SAVE DATA (DANGEROUS)</button>
    <button onclick="clearErrors()" style="border-color: #f00; color: #f00;">RESET ERRORS</button>
</div>

<div id="capture">
    <div class="header">
        <div style="font-size: 10px;">AUTH_LEVEL: OVERRIDE</div>
        <h1>SYNC_MONITOR // ALERT</h1>
        <div style="font-size: 10px; color: var(--arch-gold);">INTERNAL_DATA_BREACH</div>
    </div>

    <div class="main-grid">
        <div class="subject-info" id="info1">
            <div class="photo-frame"><img id="img1"></div>
            <div class="text-display" id="outName1">SUBJECT_A</div>
            <div class="attr-display" id="outAttr1">[WAITING]</div>
        </div>

        <div class="center-core">
            <img src="「ARCH」 Symbol Logo White Ver.png" class="arch-logo">
            <div style="font-size: 12px; color: var(--neon-cyan); letter-spacing: 4px;">SYNCHRONIZATION</div>
            <div class="sync-val" id="percent">--%</div>
            <div class="rank-badge" id="rank">RANK --</div>
        </div>

        <div class="subject-info" id="info2">
            <div class="photo-frame"><img id="img2"></div>
            <div class="text-display" id="outName2">SUBJECT_B</div>
            <div class="attr-display" id="outAttr2">[WAITING]</div>
        </div>
    </div>
    
    <div id="error-container"></div>
</div>

<div class="input-ui" id="input-area">
    <div class="ui-group">
        <input type="file" id="file1" style="width: 150px;">
        <input type="text" id="nameInput1" placeholder="NAME A" style="width: 100px;">
        <select id="attrInput1" onchange="updateTheme(1)">
            <option value="none">속성</option>
            <option value="pyre">🔥 불 (Pyre)</option>
            <option value="aqua">💧 물 (Aqua)</option>
            <option value="verde">🌿 풀 (Verde)</option>
            <option value="fulmen">⚡ 번개 (Fulmen)</option>
            <option value="aero">💨 바람 (Aero)</option>
            <option value="glacies">❄️ 얼음 (Glacies)</option>
        </select>
    </div>
    <div class="ui-group">
        <input type="file" id="file2" style="width: 150px;">
        <input type="text" id="nameInput2" placeholder="NAME B" style="width: 100px;">
        <select id="attrInput2" onchange="updateTheme(2)">
            <option value="none">속성</option>
            <option value="pyre">🔥 불 (Pyre)</option>
            <option value="aqua">💧 물 (Aqua)</option>
            <option value="verde">🌿 풀 (Verde)</option>
            <option value="fulmen">⚡ 번개 (Fulmen)</option>
            <option value="aero">💨 바람 (Aero)</option>
            <option value="glacies">❄️ 얼음 (Glacies)</option>
        </select>
    </div>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
    file1.onchange = e => img1.src = URL.createObjectURL(e.target.files[0]);
    file2.onchange = e => img2.src = URL.createObjectURL(e.target.files[0]);

    const attrColors = {
        pyre: '#ff4d00', aqua: '#0088ff', verde: '#00ff66',
        fulmen: '#f2ff00', aero: '#00ffcc', glacies: '#a0e9ff', none: '#ffffff'
    };

    function updateTheme(id) {
        const val = document.getElementById('attrInput' + id).value;
        document.documentElement.style.setProperty('--theme-color' + id, attrColors[val]);
    }

    function calc(){
        document.getElementById('outName1').innerText = document.getElementById('nameInput1').value || 'SUBJECT_A';
        document.getElementById('outAttr1').innerText = document.getElementById('attrInput1').options[document.getElementById('attrInput1').selectedIndex].text;
        document.getElementById('outName2').innerText = document.getElementById('nameInput2').value || 'SUBJECT_B';
        document.getElementById('outAttr2').innerText = document.getElementById('attrInput2').options[document.getElementById('attrInput2').selectedIndex].text;

        const p = Math.floor(Math.random()*101);
        percent.innerText = p + "%";
        let r = "C";
        if(p > 99) r = "SSS"; else if(p > 90) r = "S"; else if(p > 75) r = "A";
        rank.innerText = "RANK " + r;
    }

    // 🚨 무작위 에러 팝업 생성 함수 🚨
    function spawnError() {
        const container = document.getElementById('error-container');
        const errors = [
            "ACCESS_DENIED: Security Clearance Level 5 Required.",
            "MEMORY_CORRUPTION: Trace detected in Sector 7.",
            "WARNING: Sentinel core overheating.",
            "ERROR: Unauthorized synchronization attempt.",
            "CRITICAL: ARCH firewall breach detected.",
            "SYSTEM_OVERLOAD: Too many requests."
        ];
        
        const popup = document.createElement('div');
        popup.className = 'error-popup';
        
        // 무작위 위치 설정 (캡처 영역 안쪽)
        const top = Math.random() * 600 + 50;
        const left = Math.random() * 850 + 50;
        popup.style.top = `${top}px`;
        popup.style.left = `${left}px`;
        
        const randomMsg = errors[Math.floor(Math.random() * errors.length)];
        
        popup.innerHTML = `
            <div class="err-head"><span>SYSTEM_ALERT</span><span onclick="this.parentElement.parentElement.remove()" style="cursor:pointer">×</span></div>
            <div class="err-body">
                <span style="font-size:20px; color:red;">⚠️</span>
                <span><strong>FATAL_ERROR</strong><br>${randomMsg}</span>
            </div>
        `;
        container.appendChild(popup);
    }

    function clearErrors() {
        document.getElementById('error-container').innerHTML = '';
    }

    function saveImage(){
        // 1. 에러창을 "두두두" 생성 (0.1초 간격으로 8개)
        let count = 0;
        const interval = setInterval(() => {
            spawnError();
            count++;
            if(count >= 8) {
                clearInterval(interval);
                // 2. 모든 에러가 뜬 후 캡처 시작
                captureFinal();
            }
        }, 100);
    }

    function captureFinal() {
        html2canvas(document.querySelector("#capture"), { backgroundColor: "#000", scale: 2 }).then(canvas => {
            const link = document.createElement("a");
            link.download = "ARCH_OVERLOAD_REPORT.png";
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
