<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCH_SYNC_FIXED_v5.6</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+KR:wght@300;700&display=swap');

        :root {
            --neon-cyan: #00f2ff;
            --arch-gold: #d4af37;
            --theme-color1: #ffffff;
            --theme-color2: #ffffff;
        }

        body {
            margin: 0; background: #050505; color: #fff;
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding: 20px; overflow-x: hidden; cursor: none;
        }

        /* ⭐ 커서 라이트 효과 (유지) */
        .cursor-light {
            position: fixed; width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
            pointer-events: none; transform: translate(-50%, -50%); z-index: 10000;
        }

        #top-controls { margin-bottom: 20px; display: flex; gap: 15px; z-index: 5000; }
        button {
            background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan);
            padding: 10px 30px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold;
            transition: 0.3s; text-transform: uppercase;
        }
        button:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 20px var(--neon-cyan); }

        /* 캡처 영역 (1200x800 고정) */
        #capture {
            width: 1200px; height: 800px; background: #000;
            position: relative; padding: 40px; box-sizing: border-box;
            border: 2px solid #333; display: flex; flex-direction: column;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                radial-gradient(circle at center, #111 0%, #000 100%);
            background-size: 40px 40px, 40px 40px, 100% 100%;
            overflow: hidden;
        }

        .scanline {
            position: absolute; width: 100%; height: 2px;
            background: rgba(255,255,255,0.4); box-shadow: 0 0 20px white;
            top: 0; animation: scan 3s linear infinite; pointer-events: none; z-index: 10;
        }
        @keyframes scan { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 100% { top: 100%; opacity: 0; } }

        .glitch { animation: glitch 0.2s infinite; color: #ff0044 !important; text-shadow: 2px 2px #00f2ff !important; }
        @keyframes glitch { 0% { transform: translate(0); } 25% { transform: translate(-3px,2px); } 50% { transform: translate(3px,-2px); } 100% { transform: translate(0); } }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #fff; padding-bottom: 15px; margin-bottom: 30px; }
        .header h1 { margin: 0; letter-spacing: 8px; font-size: 26px; text-shadow: 0 0 10px #fff; }

        .main-grid { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 30px; flex: 1; align-items: center; z-index: 5; }

        .subject-info { 
            display: flex; flex-direction: column; gap: 15px; padding: 25px; 
            background: rgba(255,255,255,0.03); border: 2px solid var(--theme-color); 
            transition: 0.5s; box-shadow: inset 0 0 20px rgba(255,255,255,0.05);
        }
        #info1 { --theme-color: var(--theme-color1); }
        #info2 { --theme-color: var(--theme-color2); }

        .photo-frame { 
            width: 100%; aspect-ratio: 1/1; border: 1px solid rgba(255,255,255,0.2); 
            overflow: hidden; background: url('「ARCH」 Symbol Logo White Ver.png') no-repeat center center / 40% #050505; 
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        .text-display { font-size: 24px; font-weight: 900; letter-spacing: 2px; border-bottom: 1px solid #444; padding-bottom: 5px; color: #fff; }
        .attr-display { font-size: 15px; color: var(--arch-gold); font-family: 'Noto Sans KR'; margin-top: 5px; }

        .center-core { position: relative; text-align: center; }
        .arch-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 480px; opacity: 0.15; pointer-events: none; }
        .sync-val { font-size: 130px; font-weight: 900; line-height: 1; text-shadow: 0 0 40px #fff; margin: 15px 0; font-style: italic; z-index: 1; position: relative; transition: 0.3s; }
        #sync-status { font-size: 14px; color: var(--neon-cyan); letter-spacing: 3px; margin-bottom: 5px; font-weight: bold; }
        .rank-badge { font-size: 26px; border: 2px solid #fff; padding: 8px 40px; box-shadow: 0 0 20px #fff; background: rgba(0,0,0,0.5); position: relative; z-index: 1; }

        .input-ui { display: flex; justify-content: center; gap: 25px; margin-top: 30px; width: 1200px; padding: 20px; background: rgba(255,255,255,0.05); border: 1px solid #333; z-index: 5000; }
        .ui-group { display: flex; gap: 12px; align-items: center; }
        input[type=text], select { padding: 10px; background: #fff; border: none; font-weight: bold; font-family: 'Noto Sans KR'; cursor: default; }

        .error-popup {
            position: absolute; width: 260px; background: #c0c0c0; border: 2px solid; border-color: #eee #888 #888 #eee; color: #000;
            padding: 2px; font-family: 'Tahoma', sans-serif; font-size: 11px; z-index: 1000; box-shadow: 10px 10px 20px rgba(0,0,0,0.5);
        }
        .err-head { background: #000080; color: #fff; padding: 4px 6px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="cursor-light" id="cursor"></div>

<div id="top-controls">
    <button onclick="calcSync()">ANALYZE SYNC</button>
    <button onclick="saveImage()">SAVE DATA</button>
    <button onclick="clearErrors()" style="border-color: #f00; color: #f00;">CLEAR ALERTS</button>
</div>

<div id="capture">
    <div class="scanline"></div>
    <div id="error-container"></div>

    <div class="header">
        <div style="font-size: 11px;">AUTH: OVERRIDE_v5.6</div>
        <h1>ARCH_SYNC_INTERFACE</h1>
        <div style="font-size: 11px; color: var(--arch-gold);">SYSTEM_INTEGRITY: ACTIVE</div>
    </div>

    <div class="main-grid">
        <div class="subject-info" id="info1">
            <div class="photo-frame"><img id="img1"></div>
            <div class="text-display" id="outName1">SUBJECT_A</div>
            <div class="attr-display" id="outAttr1">무속성 (None)</div>
        </div>

        <div class="center-core">
            <img src="「ARCH」 Symbol Logo White Ver.png" class="arch-logo">
            <div id="sync-status">INITIALIZING...</div>
            <div class="sync-val" id="percent">--%</div>
            <div class="rank-badge" id="rank">RANK --</div>
        </div>

        <div class="subject-info" id="info2">
            <div class="photo-frame"><img id="img2"></div>
            <div class="text-display" id="outName2">SUBJECT_B</div>
            <div class="attr-display" id="outAttr2">무속성 (None)</div>
        </div>
    </div>
</div>

<div class="input-ui" id="input-area">
    <div class="ui-group">
        <input type="file" id="file1" style="width: 160px;">
        <input type="text" id="nameInput1" placeholder="NAME A" oninput="syncName(1)">
        <select id="attrInput1" onchange="updateTheme(1)">
            <option value="none">무속성 (None)</option>
            <option value="pyre">🔥 불 (Pyre)</option>
            <option value="aqua">💧 물 (Aqua)</option>
            <option value="verde">🌿 풀 (Verde)</option>
            <option value="fulmen">⚡ 번개 (Fulmen)</option>
            <option value="aero">💨 바람 (Aero)</option>
            <option value="glacies">❄️ 얼음 (Glacies)</option>
        </select>
    </div>
    <div class="ui-group" style="border-left: 1px solid #444; padding-left: 20px;">
        <input type="file" id="file2" style="width: 160px;">
        <input type="text" id="nameInput2" placeholder="NAME B" oninput="syncName(2)">
        <select id="attrInput2" onchange="updateTheme(2)">
            <option value="none">무속성 (None)</option>
            <option value="pyre">🔥 불 (Pyre)</option>
            <option value="aqua">💧 물 (Aqua)</option>
            <option value="verde">🌿 풀 (Verde)</option>
            <option value="fulmen">⚡ 번개 (Fulmen)</option>
            <option value="aero">💨 바람 (Aero)</option>
            <option value="glacies">❄️ 얼음 (Glacies)</option>
        </select>
    </div>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
    // 마우스 커서 라이트 로직
    document.addEventListener('mousemove', (e) => {
        const cursor = document.getElementById('cursor');
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });

    file1.onchange = e => { img1.src = URL.createObjectURL(e.target.files[0]); img1.parentElement.style.background = 'none'; }
    file2.onchange = e => { img2.src = URL.createObjectURL(e.target.files[0]); img2.parentElement.style.background = 'none'; }

    function syncName(id) {
        const val = document.getElementById('nameInput' + id).value;
        document.getElementById('outName' + id).innerText = val || 'SUBJECT_' + (id===1?'A':'B');
    }

    function updateTheme(id) {
        const select = document.getElementById('attrInput' + id);
        const attrColors = { pyre: '#ff4d00', aqua: '#0088ff', verde: '#00ff66', fulmen: '#f2ff00', aero: '#00ffcc', glacies: '#a0e9ff', none: '#ffffff' };
        document.documentElement.style.setProperty('--theme-color' + id, attrColors[select.value]);
        document.getElementById('outAttr' + id).innerText = select.options[select.selectedIndex].text;
    }

    function getType(p){
        if(p > 95) return "완전 동기화 (Perfect Sync)";
        if(p > 80) return "공명 상태 (Resonance)";
        if(p > 60) return "안정 연계 (Stable Link)";
        if(p > 40) return "불안정 결합 (Unstable)";
        return "붕괴 위험 (Critical)";
    }

    function calcSync(){
        const p = Math.floor(Math.random()*101);
        const percentEl = document.getElementById('percent');
        
        percentEl.innerText = p + "%";
        percentEl.style.color = "white";
        percentEl.style.textShadow = "0 0 40px #fff";
        percentEl.classList.remove('glitch');

        document.getElementById('sync-status').innerText = getType(p);

        if(p < 30){
            percentEl.style.color = "red";
            percentEl.style.textShadow = "0 0 20px red";
            percentEl.classList.add('glitch');
            for(let i=0; i<5; i++){ setTimeout(()=> spawnError(), i*200); }
        }

        let r = p > 98 ? "SSS" : p > 90 ? "S" : p > 75 ? "A" : p > 50 ? "B" : "C";
        document.getElementById('rank').innerText = "RANK " + r;
    }

    function spawnError() {
        const container = document.getElementById('error-container');
        const popup = document.createElement('div');
        popup.className = 'error-popup';
        popup.style.top = Math.random() * 600 + "px";
        popup.style.left = Math.random() * 900 + "px";
        popup.innerHTML = `
            <div class="err-head"><span>SYSTEM_ALERT</span><span onclick="this.parentElement.parentElement.remove()" style="cursor:pointer">×</span></div>
            <div style="padding:15px;"><strong>FATAL_ERROR</strong><br>SYNC_VITAL_LOW</div>
        `;
        container.appendChild(popup);
    }

    function clearErrors() { 
        document.getElementById('error-container').innerHTML = ''; 
        document.getElementById('percent').classList.remove('glitch');
    }

    // ⭐ 반짝 효과(flash) 제거 및 정밀 캡처 로직 적용
    async function saveImage(){
        const original = document.getElementById("capture");
        const inputArea = document.getElementById("input-area");

        // UI 숨김
        inputArea.style.display = "none";

        // ⭐ 캡처용 래퍼 생성
        const wrapper = document.createElement("div");
        wrapper.style.position = "fixed";
        wrapper.style.left = "0";
        wrapper.style.top = "0";
        wrapper.style.width = "1200px";
        wrapper.style.height = "800px";
        wrapper.style.background = "#000";
        wrapper.style.zIndex = "-1";
        wrapper.style.overflow = "hidden";

        // ⭐ clone
        const clone = original.cloneNode(true);
        clone.style.transform = "none";
        clone.style.width = "1200px";
        clone.style.height = "800px";
        clone.style.margin = "0";
        clone.style.position = "absolute";
        clone.style.left = "0";
        clone.style.top = "0";

        wrapper.appendChild(clone);
        document.body.appendChild(wrapper);

        // 강제 리플로우
        await new Promise(r => setTimeout(r, 50));

        const canvas = await html2canvas(clone, {
            backgroundColor: "#000",
            scale: 2,
            useCORS: true,
            logging: false,
            width: 1200,
            height: 800,
            windowWidth: 1200,
            windowHeight: 800
        });

        // 복사본 제거 및 UI 복구
        document.body.removeChild(wrapper);
        inputArea.style.display = "flex";

        // 다운로드
        const link = document.createElement("a");
        link.download = "ARCH_SYNC_FIXED.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>
</body>
</html>
