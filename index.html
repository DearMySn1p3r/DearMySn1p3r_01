<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>ARCH_SYNC_MONITOR_v2.0</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+KR:wght@300;700&display=swap');

    :root {
        --neon-cyan: #00f2ff;
        --arch-gold: #d4af37;
        --bg-dark: #000000;
        --base-glow: 0 0 15px rgba(255, 255, 255, 0.2);
    }

    body {
        margin: 0; background: #111; color: #fff;
        font-family: 'Orbitron', 'Noto Sans KR', sans-serif;
        display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        padding-top: 20px;
    }

    /* 상단 제어 버튼: 저장 시 제외됨 */
    #top-controls {
        margin-bottom: 30px; display: flex; gap: 20px; z-index: 1000;
    }

    button {
        background: #000; border: 2px solid #fff; color: #fff;
        padding: 12px 30px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold;
        transition: 0.3s; box-shadow: var(--base-glow); text-transform: uppercase;
    }

    button:hover { background: #fff; color: #000; box-shadow: 0 0 25px #fff; }

    /* 캡처 영역 (배경 포함) */
    #capture {
        width: 1200px; height: 750px; background: #000;
        position: relative; padding: 50px; box-sizing: border-box;
        border: 2px solid #222;
        background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        overflow: hidden;
    }

    /* 입력 UI: 저장 시 숨김 처리됨 */
    .input-ui {
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
        width: 90%; display: flex; justify-content: space-between; gap: 20px;
        z-index: 10;
    }

    .ui-panel {
        flex: 1; display: flex; gap: 10px; background: rgba(0,0,0,0.8);
        padding: 10px; border: 1px solid #333;
    }

    /* 'C:fakepath...' 제거를 위해 파일 인풋 스타일 수정 */
    .file-input-wrapper {
        position: relative; overflow: hidden; display: inline-block; width: 100px;
    }
    .file-input-wrapper input[type=file] {
        position: absolute; left: 0; top: 0; opacity: 0; font-size: 100px; cursor: pointer;
    }
    .file-btn-desc {
        background: #222; border: 1px solid #444; color: #aaa;
        padding: 8px; text-align: center; font-size: 11px;
    }

    input[type=text], select {
        flex: 1; padding: 10px; background: #fff; color: #000;
        border: none; font-weight: bold; font-size: 13px; font-family: 'Noto Sans KR';
    }

    /* 결과 출력 영역 */
    .header {
        display: flex; justify-content: space-between; align-items: flex-end;
        border-bottom: 2px solid #fff; padding-bottom: 15px; margin-bottom: 50px;
    }
    .header h1 { margin: 0; letter-spacing: 10px; font-size: 26px; text-shadow: 0 0 15px #fff; }

    .main-grid { display: grid; grid-template-columns: 320px 1fr 320px; gap: 30px; align-items: center; }

    /* 캐릭터 정보 출력창 세련되게 */
    .subject-info {
        border: 1px solid #fff; padding: 20px; background: #050505;
        box-shadow: inset 0 0 20px rgba(255,255,255,0.05), var(--base-glow);
    }
    .photo-frame {
        width: 100%; aspect-ratio: 3/4; border: 1px solid rgba(255,255,255,0.2);
        margin-bottom: 20px; overflow: hidden;
    }
    .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
    
    .text-data {
        font-family: 'Orbitron'; font-size: 18px; letter-spacing: 2px;
        margin-bottom: 8px; color: #fff; text-shadow: 0 0 5px #fff;
    }
    .attr-data {
        font-family: 'Noto Sans KR'; font-size: 14px; color: var(--arch-gold);
    }

    /* 중앙 싱크율 */
    .center-core { position: relative; text-align: center; }
    .arch-logo {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 400px; opacity: 0.15; pointer-events: none;
    }
    .sync-val { font-size: 130px; font-weight: 900; text-shadow: 0 0 40px #fff; margin: 15px 0; }
    .rank-badge { font-size: 28px; border: 2px solid #fff; padding: 5px 30px; box-shadow: 0 0 15px #fff; }
</style>
</head>
<body>

<div id="top-controls">
    <button onclick="calc()">ANALYZE</button>
    <button onclick="saveImage()">SAVE RESULT</button>
</div>

<div id="capture">
    <div class="input-ui" id="input-area">
        <div class="ui-panel">
            <div class="file-input-wrapper">
                <div class="file-btn-desc">PHOTO</div>
                <input type="file" id="file1">
            </div>
            <input type="text" id="nameInput1" placeholder="NAME A">
            <select id="attrInput1">
                <option value="">속성</option>
                <option>🔥 불 (Pyre)</option>
                <option>💧 물 (Aqua)</option>
                <option>🌿 풀 (Verde)</option>
                <option>⚡ 번개 (Fulmen)</option>
                <option>💨 바람 (Aero)</option>
                <option>❄️ 얼음 (Glacies)</option>
                <option>⚪ 무속성</option>
            </select>
        </div>
        <div class="ui-panel">
            <div class="file-input-wrapper">
                <div class="file-btn-desc">PHOTO</div>
                <input type="file" id="file2">
            </div>
            <input type="text" id="nameInput2" placeholder="NAME B">
            <select id="attrInput2">
                <option value="">속성</option>
                <option>🔥 불 (Pyre)</option>
                <option>💧 물 (Aqua)</option>
                <option>🌿 풀 (Verde)</option>
                <option>⚡ 번개 (Fulmen)</option>
                <option>💨 바람 (Aero)</option>
                <option>❄️ 얼음 (Glacies)</option>
                <option>⚪ 무속성</option>
            </select>
        </div>
    </div>

    <div class="header">
        <div style="font-size: 11px; color: #777;">DOC_VER: 1.0</div>
        <h1>ARCH_SYNC_MONITOR</h1>
        <div style="font-size: 11px; color: var(--arch-gold);">OFFICIAL_WORLD_GUIDE</div>
    </div>

    <div class="main-grid">
        <div class="subject-info">
            <div class="photo-frame"><img id="img1"></div>
            <div class="text-data" id="outName1">SUBJECT_A</div>
            <div class="attr-data" id="outAttr1">[속성 미선택]</div>
        </div>

        <div class="center-core">
            <img src="「ARCH」 Symbol Logo White Ver.png" class="arch-logo">
            <div style="font-size: 14px; letter-spacing: 5px; color: #999;">SYNCHRONIZATION RATE</div>
            <div class="sync-val" id="percent">--%</div>
            <div class="rank-badge" id="rank">RANK --</div>
        </div>

        <div class="subject-info">
            <div class="photo-frame"><img id="img2"></div>
            <div class="text-data" id="outName2">SUBJECT_B</div>
            <div class="attr-data" id="outAttr2">[속성 미선택]</div>
        </div>
    </div>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
    file1.onchange = e => img1.src = URL.createObjectURL(e.target.files[0]);
    file2.onchange = e => img2.src = URL.createObjectURL(e.target.files[0]);

    function calc(){
        // 입력 데이터를 결과창으로 복사
        document.getElementById('outName1').innerText = document.getElementById('nameInput1').value || 'SUBJECT_A';
        document.getElementById('outAttr1').innerText = document.getElementById('attrInput1').value || '[속성 미선택]';
        document.getElementById('outName2').innerText = document.getElementById('nameInput2').value || 'SUBJECT_B';
        document.getElementById('outAttr2').innerText = document.getElementById('attrInput2').value || '[속성 미선택]';

        if(!img1.src || !img2.src) { alert("이미지를 업로드해주세요."); return; }

        const p = Math.floor(Math.random()*101);
        percent.innerText = p + "%";

        let r = "C";
        if(p > 95) r = "SSS"; else if(p > 85) r = "S"; else if(p > 70) r = "A";
        rank.innerText = "RANK " + r;
    }

    function saveImage(){
        // 저장 시 입력 UI와 버튼 숨기기
        const inputArea = document.getElementById('input-area');
        inputArea.style.display = 'none';

        html2canvas(document.querySelector("#capture"), {
            backgroundColor: "#000",
            scale: 2 // 고화질
        }).then(canvas => {
            const link = document.createElement("a");
            link.download = "ARCH_SYNC_RESULT.png";
            link.href = canvas.toDataURL();
            link.click();
            // 저장 완료 후 다시 표시
            inputArea.style.display = 'flex';
        });
    }
</script>
</body>
</html>
