<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCH_SYNC_REALTIME_v5.1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+KR:wght@300;700&display=swap');

        :root {
            --neon-cyan: #00f2ff;
            --arch-gold: #d4af37;
            --theme-color1: #ffffff;
            --theme-color2: #ffffff;
        }

        body {
            margin: 0; background: #050505; color: #fff;
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding: 20px; overflow-x: hidden;
        }

        /* 컨트롤러 */
        #top-controls { margin-bottom: 20px; display: flex; gap: 15px; z-index: 5000; }
        button {
            background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan);
            padding: 10px 30px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold;
            transition: 0.3s; text-transform: uppercase;
        }
        button:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 20px var(--neon-cyan); }

        /* 캡처 영역 (1200x800) */
        #capture {
            width: 1200px; height: 800px; background: #000;
            position: relative; padding: 40px; box-sizing: border-box;
            border: 2px solid #333; display: flex; flex-direction: column;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                radial-gradient(circle at center, #111 0%, #000 100%);
            background-size: 40px 40px, 40px 40px, 100% 100%;
        }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #fff; padding-bottom: 15px; margin-bottom: 30px; }
        .header h1 { margin: 0; letter-spacing: 8px; font-size: 26px; text-shadow: 0 0 10px #fff; }

        .main-grid { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 30px; flex: 1; align-items: center; }

        /* 캐릭터 카드 */
        .subject-info { display: flex; flex-direction: column; gap: 15px; padding: 25px; background: rgba(255,255,255,0.03); border-left: 5px solid var(--theme-color); transition: 0.5s; }
        #info1 { --theme-color: var(--theme-color1); }
        #info2 { --theme-color: var(--theme-color2); }

        .photo-frame { width: 100%; aspect-ratio: 1/1; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; background: #111; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        .text-display { font-size: 24px; font-weight: 900; letter-spacing: 2px; border-bottom: 1px solid #444; padding-bottom: 5px; color: #fff; min-height: 35px; }
        .attr-display { font-size: 15px; color: var(--arch-gold); font-family: 'Noto Sans KR'; margin-top: 5px; }

        /* 중앙 싱크율 */
        .center-core { position: relative; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .arch-logo { position: absolute; width: 480px; opacity: 0.15; z-index: 0; pointer-events: none; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        .sync-val { font-size: 130px; font-weight: 900; line-height: 1; text-shadow: 0 0 40px #fff; margin: 20px 0; font-style: italic; z-index: 1; }
        .rank-badge { font-size: 26px; border: 2px solid #fff; padding: 8px 40px; box-shadow: 0 0 20px #fff; z-index: 1; background: rgba(0,0,0,0.5); }

        /* 하단 입력창 */
        .input-ui { display: flex; justify-content: center; gap: 25px; margin-top: 30px; width: 1200px; padding: 20px; background: rgba(255,255,255,0.05); border: 1px solid #333; }
        .ui-group { display: flex; gap: 12px; align-items: center; }
        input[type=text], select { padding: 10px; background: #fff; border: none; font-weight: bold; }

        /* 연출용 에러 팝업 */
        .error-popup {
            position: fixed; width: 260px; background: #c0c0c0;
            border: 2px solid; border-color: #eee #888 #888 #eee;
            color: #000; padding: 2px; font-family: 'Tahoma', sans-serif; font-size: 11px;
            z-index: 9999; box-shadow: 10px 10px 20px rgba(0,0,0,0.6);
        }
        .err-head { background: #000080; color: #fff; padding: 4px 6px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .err-body { padding: 12px; display: flex; gap: 12px; align-items: center; }
    </style>
</head>
<body>

<div id="top-controls">
    <button onclick="calcSync()">ANALYZE SYNC</button>
    <button onclick="saveImage()">SAVE DATA</button>
    <button onclick="clearErrors()" style="border-color: #f00; color: #f00;">CLEAR ALERTS</button>
</div>

<div id="capture">
    <div class="header">
        <div style="font-size: 11px;">AUTH: OVERRIDE_v5.1</div>
        <h1>SYNC_MONITOR // REALTIME</h1>
        <div style="font-size: 11px; color: var(--arch-gold);">ENCRYPTED_STREAM</div>
    </div>

    <div class="main-grid">
        <div class="subject-info" id="info1">
            <div class="photo-frame"><img id="img1" src=""></div>
            <div class="text-display" id="outName1">SUBJECT_A</div>
            <div class="attr-display" id="outAttr1">[ATTR_WAITING]</div>
        </div>

        <div class="center-core">
            <img src="「ARCH」 Symbol Logo White Ver.png" class="arch-logo">
            <div style="font-size: 14px; color: var(--neon-cyan); letter-spacing: 5px; z-index:1;">LIVE_SYNCHRONIZATION</div>
            <div class="sync-val" id="percent">--%</div>
            <div class="rank-badge" id="rank">RANK --</div>
        </div>

        <div class="subject-info" id="info2">
            <div class="photo-frame"><img id="img2" src=""></div>
            <div class="text-display" id="outName2">SUBJECT_B</div>
            <div class="attr-display" id="outAttr2">[ATTR_WAITING]</div>
        </div>
    </div>
</div>

<div id="error-container"></div>

<div class="input-ui" id="input-area">
    <div class="ui-group">
        <input type="file" id="file1" style="width: 160px;">
        <input type="text" id="nameInput1" placeholder="이름 A" oninput="syncName(1)" style="width: 100px;">
        <select id="attrInput1" onchange="updateTheme(1)">
            <option value="none">속성</option>
            <option value="pyre">🔥 불 (Pyre)</option>
            <option value="aqua">💧 물 (Aqua)</option>
            <option value="verde">🌿 풀 (Verde)</option>
            <option value="fulmen">⚡ 번개 (Fulmen)</option>
            <option value="aero">💨 바람 (Aero)</option>
            <option value="glacies">❄️ 얼음 (Glacies)</option>
        </select>
    </div>
    <div class="ui-group" style="border-left: 1px solid #444; padding-left: 20px;">
        <input type="file" id="file2" style="width: 160px;">
        <input type="text" id="nameInput2" placeholder="이름 B" oninput="syncName(2)" style="width: 100px;">
        <select id="attrInput2" onchange="updateTheme(2)">
            <option value="none">속성</option>
            <option value="pyre">🔥 불 (Pyre)</option>
            <option value="aqua">💧 물 (Aqua)</option>
            <option value="verde">🌿 풀 (Verde)</option>
            <option value="fulmen">⚡ 번개 (Fulmen)</option>
            <option value="aero">💨 바람 (Aero)</option>
            <option value="glacies">❄️ 얼음 (Glacies)</option>
        </select>
    </div>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
    file1.onchange = e => img1.src = URL.createObjectURL(e.target.files[0]);
    file2.onchange = e => img2.src = URL.createObjectURL(e.target.files[0]);

    const attrColors = {
        pyre: '#ff4d00', aqua: '#0088ff', verde: '#00ff66',
        fulmen: '#f2ff00', aero: '#00ffcc', glacies: '#a0e9ff', none: '#ffffff'
    };

    // 실시간 이름 동기화 함수
    function syncName(id) {
        const val = document.getElementById('nameInput' + id).value;
        document.getElementById('outName' + id).innerText = val || (id === 1 ? 'SUBJECT_A' : 'SUBJECT_B');
    }

    // 실시간 테마/속성 동기화 함수
    function updateTheme(id) {
        const select = document.getElementById('attrInput' + id);
        const val = select.value;
        const text = select.options[select.selectedIndex].text;
        
        document.documentElement.style.setProperty('--theme-color' + id, attrColors[val]);
        document.getElementById('outAttr' + id).innerText = text;
    }

    // 싱크율 분석 (수치만 계산)
    function calcSync(){
        const p = Math.floor(Math.random()*101);
        percent.innerText = p + "%";
        let r = "C";
        if(p > 99) r = "SSS"; else if(p > 90) r = "S"; else if(p > 75) r = "A"; else if(p > 50) r = "B";
        rank.innerText = "RANK " + r;
    }

    function spawnError() {
        const container = document.getElementById('error-container');
        const errors = ["ACCESS_DENIED", "MEMORY_CORRUPTION", "SENTINEL_OVERHEAT", "UNAUTHORIZED_SYNC", "FIREWALL_BREACH"];
        const popup = document.createElement('div');
        popup.className = 'error-popup';
        popup.style.top = Math.random() * (window.innerHeight - 150) + "px";
        popup.style.left = Math.random() * (window.innerWidth - 250) + "px";
        popup.innerHTML = `
            <div class="err-head"><span>SYSTEM_ALERT</span><span onclick="this.parentElement.parentElement.remove()" style="cursor:pointer">×</span></div>
            <div class="err-body"><span style="font-size:24px;">⚠️</span><span><strong>FATAL_ERROR</strong><br>${errors[Math.floor(Math.random()*errors.length)]}</span></div>
        `;
        container.appendChild(popup);
    }

    function clearErrors() { document.getElementById('error-container').innerHTML = ''; }

    function saveImage(){
        html2canvas(document.querySelector("#capture"), {
            backgroundColor: "#000", scale: 2,
            width: 1200, height: 800,
            windowWidth: 1200, windowHeight: 800
        }).then(canvas => {
            const link = document.createElement("a");
            link.download = "ARCH_REALTIME_REPORT.png";
            link.href = canvas.toDataURL("image/png");
            link.click();

            let count = 0;
            const interval = setInterval(() => {
                spawnError();
                count++;
                if(count >= 12) clearInterval(interval);
            }, 80);
        });
    }
</script>
</body>
</html>
