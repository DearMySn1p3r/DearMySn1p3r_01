<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCH_SYNC_INTERFACE_FINAL</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+KR:wght@300;700&display=swap');

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:'Orbitron','Noto Sans KR';
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* 버튼 */
#top-controls{
    margin:20px;
}
button{
    background:black;
    border:1px solid white;
    color:white;
    padding:10px 25px;
    cursor:pointer;
}

/* 캡처 영역 */
#capture{
    width:1200px;
    height:800px;
    background:#000;
    padding:40px;
    box-sizing:border-box;
    position:relative;
    overflow:hidden;
}

/* 입력 */
.input-ui{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:20px;
}

input, select{
    padding:6px;
}

/* 카드 */
.main{
    display:flex;
    justify-content:space-between;
    margin-top:80px;
}

.card{
    width:300px;
}

.photo{
    width:100%;
    height:300px;
    background:#111;
}

.photo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* 중앙 */
.center{
    text-align:center;
}

.percent{
    font-size:80px;
}

.rank{
    border:1px solid white;
    padding:5px 20px;
}
</style>
</head>

<body>

<div id="top-controls">
<button onclick="calc()">ANALYZE</button>
<button onclick="saveImage()">SAVE</button>
</div>

<div id="capture">

<div class="main">

<div class="card">
<div class="photo"><img id="img1"></div>
<div id="outName1">SUBJECT_A</div>
</div>

<div class="center">
<div class="percent" id="percent">--%</div>
<div class="rank" id="rank">RANK --</div>
</div>

<div class="card">
<div class="photo"><img id="img2"></div>
<div id="outName2">SUBJECT_B</div>
</div>

</div>

<div class="input-ui" id="input-area">
<input type="file" id="file1">
<input type="text" id="nameInput1" placeholder="이름">

<input type="file" id="file2">
<input type="text" id="nameInput2" placeholder="이름">
</div>

</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

// 이미지
file1.onchange = e => img1.src = URL.createObjectURL(e.target.files[0]);
file2.onchange = e => img2.src = URL.createObjectURL(e.target.files[0]);

// 🔥 이름 실시간 반영
nameInput1.addEventListener("input", () => {
    outName1.innerText = nameInput1.value || "SUBJECT_A";
});
nameInput2.addEventListener("input", () => {
    outName2.innerText = nameInput2.value || "SUBJECT_B";
});

// 계산
function calc(){
    const p = Math.floor(Math.random()*101);
    percent.innerText = p + "%";

    let r="C";
    if(p>85) r="S";
    else if(p>60) r="A";
    else if(p>40) r="B";

    rank.innerText = "RANK " + r;
}

// 💣 완전 안정 저장 함수
async function saveImage(){

    const original = document.getElementById("capture");
    const inputArea = document.getElementById("input-area");

    inputArea.style.display = "none";

    // ⭐ clone 생성 (핵심)
    const clone = original.cloneNode(true);

    clone.style.position = "fixed";
    clone.style.left = "-9999px";
    clone.style.top = "0";
    clone.style.transform = "none";
    clone.style.width = "1200px";
    clone.style.height = "800px";

    document.body.appendChild(clone);

    const canvas = await html2canvas(clone,{
        backgroundColor:"#000",
        scale:2,
        useCORS:true
    });

    document.body.removeChild(clone);
    inputArea.style.display = "flex";

    const link = document.createElement("a");
    link.download = "ARCH_RESULT.png";
    link.href = canvas.toDataURL();
    link.click();
}

</script>

</body>
</html>
