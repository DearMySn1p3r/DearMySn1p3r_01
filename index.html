<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNC STATUS MONITOR</title>
    <style>
        /* 이미지의 레트로/사이버틱한 분위기를 재현한 CSS */
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle, #222 0%, #000 100%);
        }

        .monitor-container {
            width: 90%;
            max-width: 800px;
            padding: 40px;
            border: 1px solid #444;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
        }

        /* 메인 타이틀 스타일 */
        .main-title {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 0.9;
            margin-bottom: 40px;
            text-transform: uppercase;
            font-style: italic;
            /* 테두리만 있는 글자 효과 */
            color: #fff;
            text-shadow: 2px 2px 0px #444;
        }

        /* 상태 정보 텍스트 */
        .status-info {
            font-size: 0.9rem;
            color: #bbb;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        /* 프로그레스 바 외곽 */
        .progress-wrapper {
            width: 100%;
            height: 35px;
            border: 1px solid #666;
            background-color: #111;
            margin-bottom: 50px;
            padding: 2px;
            box-sizing: border-box;
        }

        /* 실제 채워지는 바 (99.7% 애니메이션) */
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #eee 0%, #fff 100%);
            width: 0%; /* 처음엔 0% */
            transition: width 2s cubic-bezier(0.1, 0.5, 0.1, 1); /* 부드러운 로딩 효과 */
        }
